#
#

name: Check Lint (ruff)


on:
  pull_request:
    branches: [ "main", "dev" ]

  push:
    branches: [ "main", "dev" ]

  workflow_call:

  workflow_dispatch:


permissions:
  contents: read


jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.x"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0

      - name: Install dependencies
        run: uv pip install --system ruff

      - name: Log ruff version
        run: ruff --version

      - name: Check with ruff
        run: ruff check --output-format=github .

      - name: Check with ruff (format)
        if: always()
        run: ruff format --check .

      - name: Check all _DBG_* flags are False
        if: always()
        run: |
          if grep -rPn '_DBG_\w+ = (?!False)' --include='*.py' .; then
            echo "ERROR: Found _DBG_* flags not set to False"
            exit 1
          fi

      - name: Check for secrets in comments
        if: always()
        run: |
          if grep -rPn '#.*(SECRET|PASSWORD|PWD)' --include='*.py' .; then
            echo "ERROR: Found potential secret in a comment"
            exit 1
          fi

      - run: echo "🍏 This job's status is ${{ job.status }}."

  lint-ok:  # stable sentinel job for branch protection rules (avoids listing matrix variants)
    needs: lint
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All lint checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint job failed or was cancelled"
            exit 1
          fi
