name: HA Integration Tests

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly, Monday 06:00 UTC

  workflow_call:
    inputs:
      ha-ref:
        description: "HA core git ref to test against (branch, tag, or SHA)"
        required: false
        default: "dev"
        type: string

  workflow_dispatch:
    inputs:
      ha-ref:
        description: "HA core git ref (e.g. dev, master, 2025.5.0)"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  test:
    name: "HA ${{ inputs.ha-ref || 'dev' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout evohome-async (this repo)
        uses: actions/checkout@v6
        with:
          path: evohome-async
          fetch-depth: 0  # hatch-vcs needs tags

      - name: Checkout HA core
        uses: actions/checkout@v6
        with:
          repository: home-assistant/core
          ref: ${{ inputs.ha-ref || 'dev' }}
          path: ha-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install HA test dependencies
        working-directory: ha-core
        run: |
          uv pip install --system \
            -r requirements_test.txt \
            -c homeassistant/package_constraints.txt

      - name: Install evohome-async from this commit (overrides HA's pin)
        working-directory: evohome-async
        run: |
          uv pip install --system -e "." --no-deps
          # --no-deps: HA's constraint file already resolved all transitive deps.
          # Installing without deps prevents version conflicts.

      - name: Run evohome integration tests
        working-directory: ha-core
        run: |
          python -m pytest \
            tests/components/evohome/ \
            -v \
            --tb=short \
            --no-header \
            --override-ini=testpaths= \
            -p no:sugar

      - name: Report HA ref tested
        if: always()
        run: |
          echo "Tested against HA ref: ${{ inputs.ha-ref || 'dev' }}"
          cd ha-core && git log -1 --oneline
