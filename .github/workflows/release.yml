name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check-lint:
    name: Linting
    uses: ./.github/workflows/check-lint.yml

  check-type:
    name: Typing
    uses: ./.github/workflows/check-type.yml

  check-test:
    name: Testing
    uses: ./.github/workflows/check-test.yml

  build:
    name: Build distribution
    needs: [check-lint, check-type, check-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required: hatch-vcs reads tag history for version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
