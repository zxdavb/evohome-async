name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check-lint:
    name: Linting
    uses: ./.github/workflows/check-lint.yml

  check-type:
    name: Typing
    uses: ./.github/workflows/check-type.yml

  check-tests:
    name: Testing
    uses: ./.github/workflows/check-tests.yml

  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag format
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "FAIL: tag '$TAG' does not match v[0-9]+.[0-9]+.[0-9]+"
            exit 1
          fi
          echo "OK: tag format valid: $TAG"

      - name: Check tag points to a commit on main
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git fetch origin main
          TAGGED_COMMIT=$(git rev-parse "$TAG^{commit}")
          if ! git merge-base --is-ancestor "$TAGGED_COMMIT" origin/main; then
            echo "FAIL: '$TAG' does not point to a commit reachable from main"
            exit 1
          fi
          echo "OK: '$TAG' is reachable from main"

  build:
    name: Build distribution
    needs: [validate-tag, check-lint, check-type, check-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required: hatch-vcs reads tag history for version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/evohome-async
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
