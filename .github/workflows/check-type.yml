#
#

name: Typing (mypy)


on:
  pull_request:
    branches: [ "main", "dev" ]

  push:
    branches: [ "main", "dev" ]

  workflow_call:

  workflow_dispatch:


permissions:
  contents: read


jobs:
  type:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e .[cli,dev]

      - name: Log mypy version
        run: mypy --version

      - name: Check with mypy
        run: mypy

      - run: echo "🍏 This job's status is ${{ job.status }}."

  type-ok:  # stable sentinel job for branch protection rules (avoids listing matrix variants)
    needs: type
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All type checks passed
        run: |
          if [[ "${{ needs.type.result }}" != "success" ]]; then
            echo "type job failed or was cancelled"
            exit 1
          fi
