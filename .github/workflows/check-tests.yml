#
#

name: Check Tests (pytest)


on:
  pull_request:
    branches: [ "main", "dev" ]

  push:
    branches: [ "main", "dev" ]

  schedule:
    - cron: "0 18 * * 5"  # Weekly on Friday

  workflow_call:

  workflow_dispatch:


permissions:
  contents: read


jobs:
  get-python-versions:
    name: Build Python test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - name: Query non-EOL Python versions >= requires-python floor
        id: build
        run: python3 .github/scripts/get-python-versions.py

  test:
    needs: get-python-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.get-python-versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Test with pytest
        env:
          PYTEST_ADDOPTS: "--color=yes"  # cspell:ignore ADDOPTS, color
        run: uv run pytest -v

      - run: echo "🍏 This job's status is ${{ job.status }}."

  test-ok:  # stable sentinel job for branch protection rules (avoids listing matrix variants)
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All test checks passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test job failed or was cancelled"
            exit 1
          fi
