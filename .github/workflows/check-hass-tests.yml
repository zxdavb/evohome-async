# This workflow tests the evohome-async library against Home Assistant's evohome integration tests
# It clones Home Assistant core, installs this library, and runs the evohome component tests

name: Test with Home Assistant


on:
  pull_request:
    branches: [ "main" ]
    paths: [
      ".github/workflows/check-hass-tests.yml",
      "pyproject.toml",
      "src/**.py",
    ]

  push:
    branches: [ "main" ]
    paths: [
      ".github/workflows/check-hass-tests.yml",
      "pyproject.toml",
      "src/**.py",
    ]

  schedule:
    - cron: "0 5 * * 6"  # Saturdays at 05:00 UTC

  workflow_call:
    inputs:
      ha_repo:
        description: "Home Assistant repository (owner/repo)"
        required: false
        default: "home-assistant/core"
        type: string
      ha_version:
        description: "Home Assistant version/branch to test against"
        required: false
        default: "master"
        type: string

  workflow_dispatch:
    inputs:
      ha_repo:
        description: "Home Assistant repository (owner/repo)"
        required: false
        default: "home-assistant/core"
        type: string
      ha_version:
        description: "Home Assistant version/branch to test against"
        required: false
        default: "master"
        type: string


permissions:
  contents: read


env:
  HA_REPO: ${{ inputs.ha_repo || 'home-assistant/core' }}
  HA_VERSION: ${{ inputs.ha_version || 'master' }}


jobs:
  get-python-version:
    name: Get Python version from HA
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.get-version.outputs.python-version }}
    steps:
      - name: Check out ${{ env.HA_REPO }}@${{ env.HA_VERSION }} (sparse checkout of pyproject.toml)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HA_REPO }}
          ref: ${{ env.HA_VERSION }}
          sparse-checkout: pyproject.toml
          sparse-checkout-cone-mode: false

      - name: Extract Python version from pyproject.toml
        id: get-version
        run: |
          # Extract requires-python, e.g., ">=3.13.2" -> "3.13.2"
          python_version=$(grep -oP 'requires-python\s*=\s*"[><=]*\K[0-9]+\.[0-9]+(\.[0-9]+)?' pyproject.toml)
          echo "python-version=${python_version}" >> $GITHUB_OUTPUT
          echo "Detected Python version: ${python_version}"

  test-with-hass:
    name: Test with HA (Python ${{ needs.get-python-version.outputs.python-version }})
    runs-on: ubuntu-latest
    needs: get-python-version

    steps:
      - name: Set up Python ${{ needs.get-python-version.outputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.get-python-version.outputs.python-version }}
          allow-prereleases: true
          check-latest: true

      - name: Check out ${{ env.HA_REPO }}@${{ env.HA_VERSION }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HA_REPO }}
          ref: ${{ env.HA_VERSION }}
          path: home-assistant-core

      - name: Check out evohome-async
        uses: actions/checkout@v6
        with:
          path: evohome-async
          fetch-depth: 0  # Fetch all history for tags

      - name: Checkout latest release tag (scheduled runs only)
        if: github.event_name == 'schedule'
        working-directory: evohome-async
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "Checking out latest release: $LATEST_TAG"
          git checkout "$LATEST_TAG"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: |
            home-assistant-core/requirements*.txt
            home-assistant-core/pyproject.toml

      - name: Create virtual environment
        working-directory: home-assistant-core
        run: |
          python -m venv venv
          . venv/bin/activate

          pip install "$(grep '^uv' < requirements.txt)"

      - name: Install Home Assistant test dependencies
        working-directory: home-assistant-core
        run: |
          . venv/bin/activate

          uv pip install -r requirements.txt
          uv pip install -r requirements_test.txt

          # requirements_test_all.txt was removed in home-assistant/core#171530.
          # These two packages from requirements_all.txt are the only ones needed
          # beyond requirements.txt + requirements_test.txt:
          #   - aiohasupervisor: imported at module level in tests/components/conftest.py
          #   - paho-mqtt: imported at module level in tests/common.py (line 32)
          grep -E '^(aiohasupervisor|paho-mqtt)==' requirements_all.txt | xargs -d '\n' uv pip install

          # Install Home Assistant in editable mode (needed for compiled translations)
          uv pip install -e . --config-settings editable_mode=compat

      - name: Compile English translations
        working-directory: home-assistant-core
        run: |
          . venv/bin/activate

          python -m script.translations develop --all

      - name: Install evohome-async from its repo (replacing PyPI version)
        working-directory: home-assistant-core
        run: |
          . venv/bin/activate

          # Uninstall the PyPI version and install our local version
          uv pip uninstall evohome-async || true
          uv pip install -e ../evohome-async

      - name: Verify evohome-async installation
        working-directory: home-assistant-core
        run: |
          . venv/bin/activate

          # Verify it's our local version (should be in evohome-async directory)
          python -c "import evohomeasync2; assert 'evohome-async' in evohomeasync2.__file__, 'Not using local evohome-async!'"

      - name: Run Home Assistant evohome tests (only)
        working-directory: home-assistant-core
        env:
          PYTHONDONTWRITEBYTECODE: 1  # cspell:ignore PYTHONDONTWRITEBYTECODE
          PYTEST_ADDOPTS: "--color=yes"  # cspell:ignore ADDOPTS, color
        run: |
          . venv/bin/activate

            # HA sets testpaths=tests, which combines with the CLI arg and collects ALL
            #components; clearing it cuts collection time significantly

          python -m pytest \
            -vv \
            --override-ini=testpaths= \
            --timeout=30 \
            --durations=10 \
            -p no:sugar \
            --cov=homeassistant.components.evohome \
            --cov-report term-missing \
            tests/components/evohome/

      - run: echo "🍏 This job's status is ${{ job.status }}."

  hass-ok:  # stable sentinel job for branch protection rules (avoids listing matrix variants)
    needs: test-with-hass
    runs-on: ubuntu-latest
    if: always()
    continue-on-error: true  # informational for now — failures do not block merges
    steps:
      - name: All HA checks passed
        run: |
          if [[ "${{ needs.test-with-hass.result }}" != "success" ]]; then
            echo "test-with-hass job failed or was cancelled"
            exit 1
          fi
