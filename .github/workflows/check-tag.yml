#
#

name: Check Version Tag


on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string


permissions:
  contents: read


jobs:
  check-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check tag format
        run: |
          TAG="${{ inputs.tag_name }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "FAIL: tag '$TAG' does not match v[0-9]+.[0-9]+.[0-9]+"
            exit 1
          fi
          echo "OK: tag format valid: $TAG"
