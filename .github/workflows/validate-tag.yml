name: Validate Version Tag


on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"  # invalid, trigger on these to provide feedback


permissions:
  contents: read


jobs:
  validate-tag:  # Don't go any further, if there is no valid tag
    name: Validate tag
    uses: ./.github/workflows/check-tag.yml
    with:
      tag_name: ${{ github.ref_name }}

  check-lint:
    name: Linting
    needs: [validate-tag]
    uses: ./.github/workflows/check-lint.yml

  check-tests:
    name: Testing
    needs: [validate-tag]
    uses: ./.github/workflows/check-tests.yml

  check-type:
    name: Typing
    needs: [validate-tag]
    uses: ./.github/workflows/check-type.yml

  ha-integration:
    name: HA Integration (dev)
    needs: [check-lint, check-type, check-tests]
    uses: ./.github/workflows/check-hass-tests.yml
    # Targets home-assistant/core @ dev (the branch with the migrated integration).
    # Testing the tagged library against the stable HA release is a no-op until a
    # stable release ships the refactored client — add it back then.
