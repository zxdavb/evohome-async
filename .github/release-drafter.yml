name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "bugfix"
      - "fix"
  - title: "⬆️ Dependencies"
    labels:
      - "dependencies"
    collapse-after: 5
  - title: "🏠 HA Integration"
    labels:
      - "ha-integration"
  - title: "🔧 Internal / CI"
    labels:
      - "ci"
      - "internal"
    collapse-after: 3

exclude-labels:
  - "skip-changelog"

template: |
  ## What's changed
  $CHANGES

  **Full changelog:** $PREVIOUS_TAG...v$NEXT_PATCH_VERSION
